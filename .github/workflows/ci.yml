name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  VCPKG_ROOT: C:\vcpkg

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '74e6536215718009aae747d86d84b78376bf9e09'
          vcpkgDirectory: C:\vcpkg

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install --triplet=x64-windows `
            cpp-base64 `
            cpp-httplib[core,openssl,zlib] `
            crc32c `
            date `
            nlohmann-json `
            openssl `
            protobuf[core,zlib] `
            pugixml `
            tl-expected `
            gtest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

          cmake --build build --parallel

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120

  build-macos:
    runs-on: macos-latest
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '74e6536215718009aae747d86d84b78376bf9e09'
          vcpkgDirectory: /usr/local/share/vcpkg

      - name: Install system dependencies
        run: |
          brew install ninja unixodbc

      - name: Build
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

          cmake --build build --parallel

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120

  build-linux:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build unixodbc-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '74e6536215718009aae747d86d84b78376bf9e09'
          vcpkgDirectory: /usr/local/share/vcpkg

      - name: Build
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

          cmake --build build --parallel

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120
